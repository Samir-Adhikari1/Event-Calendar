<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COSMO — Day Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="header">
            <div class="logo-ring"></div>
            <h1>DAY <span>FINDER</span></h1>
            <p class="subtitle">Locate any date in the cosmos of time</p>
        </div>

        <div class="card">
            <div class="inputs-row">
                <div class="input-group">
                    <label>DAY</label>
                    <input type="number" id="dayInput" placeholder="DD" min="1" max="31" required>
                </div>

                <div class="input-group">
                    <label>MONTH</label>
                    <select id="monthInput">
                        <option value="0">January</option>
                        <option value="1">February</option>
                        <option value="2">March</option>
                        <option value="3">April</option>
                        <option value="4">May</option>
                        <option value="5">June</option>
                        <option value="6">July</option>
                        <option value="7">August</option>
                        <option value="8">September</option>
                        <option value="9">October</option>
                        <option value="10">November</option>
                        <option value="11">December</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>YEAR</label>
                    <input type="number" id="yearInput" placeholder="YYYY" min="1000" max="9999" required>
                </div>
            </div>

            <button id="findBtn">
                <span class="btn-text">FIND DAY</span>
                <div class="btn-glow"></div>
            </button>

            <div id="result"></div>
        </div>

        <div class="footer">COSMO © 2026</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
